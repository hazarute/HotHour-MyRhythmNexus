name: Protect main branch

on:
  workflow_dispatch:

jobs:
  protect-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Configure branch protection for 'main'
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'main';
            const requiredContexts = [ 'frontend' ];

            const params = {
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: requiredContexts
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismissal_restrictions: {},
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 1
              },
              restrictions: null
            };

            await github.rest.repos.updateBranchProtection(params);

      - name: Output note
        run: |
          echo "Branch protection request submitted for 'main'."
          echo "If this step fails with permissions error, run again with a PAT that has admin:org or repo admin rights."
