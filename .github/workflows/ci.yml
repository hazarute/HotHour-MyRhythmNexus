name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit -- --run

  notify:
    runs-on: ubuntu-latest
    needs: frontend
    if: always()
    steps:
      - name: Notify Slack if configured
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          echo "Preparing Slack notification..."
          if [ "${{ needs.frontend.result }}" = "success" ]; then
            status_text="CI passed: ${GITHUB_REPOSITORY} (${GITHUB_REF})"
            color="#36a64f"
          else
            status_text="CI failed: ${GITHUB_REPOSITORY} (${GITHUB_REF})"
            color="#ff0000"
          fi
          payload=$(printf '{"attachments":[{"color":"%s","text":"%s"}]}' "$color" "$status_text")
          curl -s -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest -q
